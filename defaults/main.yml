# Set to a non-empty string to enable password-based agent enrollment.
wazuh_enrollment_password: ""

# What contents the agent.conf file should have, a mechanism to configure agents remotely
#
# Example:
# wazuh_agent_conf: |
#   <agent_config name="92603de31548">
#     <labels>
#       <label key="aws.instance-id">i-052a1838c</label>
#       <label key="aws.sec-group">sg-1103</label>
#       <label key="network.ip">172.17.0.0</label>
#       <label key="network.mac">02:42:ac:11:00:02</label>
#       <label key="installation" hidden="yes">July 1st, 2024</label>
#     </labels>
#   </agent_config>
wazuh_agent_conf: ""

# List of custom rules to deploy to the manager. Each item must have a `file` name and `contents`.
#
# Example:
# wazuh_rules:
#   - file: local_rules.xml
#     contents: |
#       <group name="local,">
#         <rule id="100001" level="3">
#           <description>Custom rule example</description>
#         </rule>
#       </group>
wazuh_rules: []

