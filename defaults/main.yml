wazuh_certs_generator_identifier: "{{ wazuh_identifier }}-certs-generator"

wazuh_certs_generator_container_image_registry_prefix: "{{ wazuh_certs_generator_container_image_registry_prefix_upstream }}"
wazuh_certs_generator_container_image_registry_prefix_upstream: "{{ wazuh_certs_generator_container_image_registry_prefix_upstream_default }}"
wazuh_certs_generator_container_image_registry_prefix_upstream_default: docker.io/
wazuh_certs_generator_container_image: "{{ wazuh_certs_generator_container_image_registry_prefix }}wazuh/wazuh-certs-generator:{{ wazuh_certs_generator_container_image_tag }}"
# renovate: datasource=docker depName=wazuh/wazuh-certs-generator versioning=semver
wazuh_certs_generator_container_image_tag: "0.0.4"
wazuh_certs_generator_container_image_force_pull: false

# Default Wazuh certificate generation configuration template which covers the generic use case.
# You can customize it by controlling the various variables inside it.
#
# For a more advanced customization, you can extend the default (see `wazuh_certs_yml_extension_yaml`)
# or completely replace this variable with your own template.
wazuh_certs_yml_yaml: "{{ lookup('template', role_path + '/templates/certs/certs.yml.j2') }}"

wazuh_certs_yml_extension_yaml: |
  # Your custom YAML configuration for Wazuh certificate generation goes here.
  # This configuration extends the default starting configuration (`wazuh_certs_yml_yaml`).
  #
  # You can override individual variables from the default configuration, or introduce new ones.
  #
  # If you need something more special, you can take full control by
  # completely redefining `wazuh_certs_yml_yaml`.
  #
  # Example configuration extension follows:
  #
  # nodes:
  #   indexer:
  #     - name: wazuh.indexer
  #       ip: 10.0.0.5

wazuh_certs_yml_extension: "{{ wazuh_certs_yml_extension_yaml | from_yaml if wazuh_certs_yml_extension_yaml | from_yaml is mapping else {} }}"

# Holds the final Wazuh certificate generation configuration (a combination of the default and its extension).
# You most likely don't need to touch this variable. Instead, see `wazuh_certs_yml_yaml`.
wazuh_certs_yml: "{{ wazuh_certs_yml_yaml | from_yaml | combine(wazuh_certs_yml_extension, recursive=True) }}"

