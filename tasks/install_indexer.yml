---
- name: Ensure Wazuh indexer data directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0750"
    owner: "{{ wazuh_uid }}"
    group: "{{ wazuh_gid }}"
  with_items:
    - "{{ wazuh_data_path }}/indexer"
    - "{{ wazuh_data_path }}/indexer/data"
    - "{{ wazuh_data_path }}/indexer/config"

- name: Ensure vm.max_map_count is set for OpenSearch
  ansible.posix.sysctl:
    name: vm.max_map_count
    value: "262144"
    sysctl_set: true
    reload: true

- name: Ensure Wazuh indexer opensearch.yml is installed
  ansible.builtin.copy:
    content: "{{ wazuh_indexer_opensearch_yml | to_nice_yaml(indent=2) }}"
    dest: "{{ wazuh_data_path }}/indexer/config/opensearch.yml"
    mode: "0640"
    owner: "{{ wazuh_uid }}"
    group: "{{ wazuh_gid }}"
  register: wazuh_indexer_opensearch_yml_result

- name: Ensure Wazuh indexer internal_users.yml is installed
  ansible.builtin.copy:
    content: "{{ wazuh_indexer_internal_users_yml | to_nice_yaml(indent=2) }}"
    dest: "{{ wazuh_data_path }}/indexer/config/internal_users.yml"
    mode: "0640"
    owner: "{{ wazuh_uid }}"
    group: "{{ wazuh_gid }}"
  register: wazuh_indexer_internal_users_result

- name: Ensure Wazuh indexer environment file is installed
  ansible.builtin.template:
    src: "{{ role_path }}/templates/indexer/env.j2"
    dest: "{{ wazuh_base_path }}/indexer.env"
    mode: "0600"
    owner: root
    group: root
  register: wazuh_indexer_env_result

- name: Ensure Wazuh indexer container image is pulled via community.docker.docker_image_pull
  when: devture_systemd_docker_base_container_image_pull_method == 'ansible-module'
  community.docker.docker_image_pull:
    name: "{{ wazuh_indexer_container_image }}"
    pull: always
  register: wazuh_indexer_container_image_pull_result_ansible_module
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: wazuh_indexer_container_image_pull_result_ansible_module is not failed

- name: Ensure Wazuh indexer container image is pulled via ansible.builtin.command
  when: devture_systemd_docker_base_container_image_pull_method == 'command'
  ansible.builtin.command:
    cmd: "{{ devture_systemd_docker_base_host_command_docker }} pull {{ wazuh_indexer_container_image }}"
  register: wazuh_indexer_container_image_pull_result_command
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: wazuh_indexer_container_image_pull_result_command is not failed
  changed_when: "'Downloaded newer image' in wazuh_indexer_container_image_pull_result_command.stdout"

- name: Ensure Wazuh indexer systemd service is installed
  ansible.builtin.template:
    src: "{{ role_path }}/templates/systemd/wazuh-indexer.service.j2"
    dest: "{{ devture_systemd_docker_base_systemd_path }}/{{ wazuh_indexer_identifier }}.service"
    mode: "0644"
  register: wazuh_indexer_systemd_service_result

- name: Ensure Wazuh indexer systemd service is enabled
  ansible.builtin.systemd:
    name: "{{ wazuh_indexer_identifier }}.service"
    enabled: true
    daemon_reload: true

- name: Determine whether Wazuh indexer needs a restart
  ansible.builtin.set_fact:
    wazuh_indexer_restart_necessary: >-
      {{
        wazuh_indexer_opensearch_yml_result.changed | default(false)
        or wazuh_indexer_internal_users_result.changed | default(false)
        or wazuh_indexer_env_result.changed | default(false)
        or wazuh_indexer_systemd_service_result.changed | default(false)
        or wazuh_indexer_container_image_pull_result_ansible_module.changed | default(false)
        or wazuh_indexer_container_image_pull_result_command.changed | default(false)
      }}

- name: Notify about Wazuh indexer needing restart
  when: wazuh_indexer_restart_necessary | bool
  ansible.builtin.set_fact:
    devture_playbook_runtime_messages_list: |
      {{
        devture_playbook_runtime_messages_list | default([])
        +
        [
          "Note: The Wazuh indexer configuration has changed. Restart the `" ~ wazuh_indexer_identifier ~ ".service` systemd service to apply changes."
        ]
      }}
