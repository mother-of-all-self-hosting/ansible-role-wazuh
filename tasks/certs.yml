---
- name: Check if Wazuh certificates have already been generated
  ansible.builtin.stat:
    path: "{{ wazuh_certs_path }}/.generated"
  register: wazuh_certs_generated_stat

- name: Generate Wazuh certificates
  when: not wazuh_certs_generated_stat.stat.exists
  block:
    - name: Ensure Wazuh certs output directory exists
      ansible.builtin.file:
        path: "{{ wazuh_certs_path }}/output"
        state: directory
        mode: "0750"
        owner: root
        group: root

    - name: Write certs.yml for certificate generation
      ansible.builtin.copy:
        content: "{{ wazuh_certs_yml_yaml }}"
        dest: "{{ wazuh_certs_path }}/certs.yml"
        owner: root
        group: root
        mode: "0640"

    - name: Install wazuh-certs-tool.sh
      ansible.builtin.copy:
        src: "{{ role_path }}/files/wazuh-certs-tool.sh"
        dest: "{{ wazuh_certs_path }}/wazuh-certs-tool.sh"
        owner: root
        group: root
        mode: "0750"

    - name: Install wazuh-certs-entrypoint.sh
      ansible.builtin.copy:
        src: "{{ role_path }}/files/wazuh-certs-entrypoint.sh"
        dest: "{{ wazuh_certs_path }}/wazuh-certs-entrypoint.sh"
        owner: root
        group: root
        mode: "0750"

    - name: Ensure wazuh-certs-generator container image is pulled via community.docker.docker_image_pull
      when: devture_systemd_docker_base_container_image_pull_method == 'ansible-module'
      community.docker.docker_image_pull:
        name: "{{ wazuh_certs_generator_container_image }}"
        pull: always
      register: wazuh_certs_generator_container_image_pull_result_ansible_module
      retries: "{{ devture_playbook_help_container_retries_count }}"
      delay: "{{ devture_playbook_help_container_retries_delay }}"
      until: wazuh_certs_generator_container_image_pull_result_ansible_module is not failed

    - name: Ensure wazuh-certs-generator container image is pulled via ansible.builtin.command
      when: devture_systemd_docker_base_container_image_pull_method == 'command'
      ansible.builtin.command:
        cmd: "{{ devture_systemd_docker_base_host_command_docker }} pull {{ wazuh_certs_generator_container_image }}"
      register: wazuh_certs_generator_container_image_pull_result_command
      retries: "{{ devture_playbook_help_container_retries_count }}"
      delay: "{{ devture_playbook_help_container_retries_delay }}"
      until: wazuh_certs_generator_container_image_pull_result_command is not failed
      changed_when: "'Downloaded newer image' in wazuh_certs_generator_container_image_pull_result_command.stdout"

    - name: Install wazuh-certs-generator systemd service
      ansible.builtin.template:
        src: "{{ role_path }}/templates/systemd/wazuh-certs-generator.service.j2"
        dest: "{{ devture_systemd_docker_base_systemd_path }}/{{ wazuh_certs_generator_identifier }}.service"
        owner: root
        group: root
        mode: "0644"

    - name: Run wazuh-certs-generator systemd service
      ansible.builtin.systemd:
        name: "{{ wazuh_certs_generator_identifier }}.service"
        state: started
        daemon_reload: true

    - name: Ensure per-component certificate directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0750"
        owner: root
        group: root
      with_items:
        - "{{ wazuh_certs_path }}/manager"
        - "{{ wazuh_certs_path }}/indexer"
        - "{{ wazuh_certs_path }}/dashboard"

    - name: Distribute manager certificates
      ansible.builtin.copy:
        src: "{{ wazuh_certs_path }}/output/{{ item.src }}"
        dest: "{{ wazuh_certs_path }}/manager/{{ item.dest }}"
        remote_src: true
        owner: "{{ wazuh_manager_uid }}"
        group: "{{ wazuh_manager_gid }}"
        mode: "0640"
      with_items:
        - {src: root-ca.pem, dest: root-ca-manager.pem}
        - {src: root-ca.key, dest: root-ca-manager.key}
        - {src: wazuh.manager.pem, dest: wazuh.manager.pem}
        - {src: wazuh.manager-key.pem, dest: wazuh.manager-key.pem}

    - name: Distribute indexer certificates
      ansible.builtin.copy:
        src: "{{ wazuh_certs_path }}/output/{{ item }}"
        dest: "{{ wazuh_certs_path }}/indexer/{{ item }}"
        remote_src: true
        owner: "{{ wazuh_uid }}"
        group: "{{ wazuh_gid }}"
        mode: "0640"
      with_items:
        - root-ca.pem
        - wazuh.indexer.pem
        - wazuh.indexer-key.pem
        - admin.pem
        - admin-key.pem

    - name: Distribute dashboard certificates
      ansible.builtin.copy:
        src: "{{ wazuh_certs_path }}/output/{{ item }}"
        dest: "{{ wazuh_certs_path }}/dashboard/{{ item }}"
        remote_src: true
        owner: "{{ wazuh_uid }}"
        group: "{{ wazuh_gid }}"
        mode: "0640"
      with_items:
        - root-ca.pem
        - wazuh.dashboard.pem
        - wazuh.dashboard-key.pem

    - name: Mark Wazuh certificates as generated
      ansible.builtin.file:
        path: "{{ wazuh_certs_path }}/.generated"
        state: touch
        owner: root
        group: root
        mode: "0400"
