---
- name: Ensure Wazuh dashboard data directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0750"
    owner: "{{ wazuh_uid }}"
    group: "{{ wazuh_gid }}"
  with_items:
    - "{{ wazuh_data_path }}/dashboard"
    - "{{ wazuh_data_path }}/dashboard/config"
    - "{{ wazuh_data_path }}/dashboard/data"
    - "{{ wazuh_data_path }}/dashboard/data/config"
    - "{{ wazuh_data_path }}/dashboard/custom"

- name: Ensure Wazuh dashboard opensearch_dashboards.yml is installed
  ansible.builtin.copy:
    content: "{{ wazuh_dashboard_opensearch_dashboards_yml | to_nice_yaml(indent=2) }}"
    dest: "{{ wazuh_data_path }}/dashboard/config/opensearch_dashboards.yml"
    mode: "0640"
    owner: "{{ wazuh_uid }}"
    group: "{{ wazuh_gid }}"
  register: wazuh_dashboard_opensearch_yml_result

- name: Ensure Wazuh dashboard wazuh.yml is installed
  ansible.builtin.copy:
    content: "{{ wazuh_dashboard_wazuh_yml | to_nice_yaml(indent=2) }}"
    dest: "{{ wazuh_data_path }}/dashboard/data/config/wazuh.yml"
    mode: "0640"
    owner: "{{ wazuh_uid }}"
    group: "{{ wazuh_gid }}"
  register: wazuh_dashboard_wazuh_yml_result

- name: Ensure Wazuh dashboard environment file is installed
  ansible.builtin.template:
    src: "{{ role_path }}/templates/dashboard/env.j2"
    dest: "{{ wazuh_base_path }}/dashboard.env"
    mode: "0600"
    owner: root
    group: root
  register: wazuh_dashboard_env_result

- name: Ensure Wazuh dashboard labels file is installed
  ansible.builtin.template:
    src: "{{ role_path }}/templates/dashboard/labels.j2"
    dest: "{{ wazuh_base_path }}/dashboard.labels"
    mode: "0640"
    owner: root
    group: root
  register: wazuh_dashboard_labels_result

- name: Ensure Wazuh dashboard container image is pulled via community.docker.docker_image_pull
  when: devture_systemd_docker_base_container_image_pull_method == 'ansible-module'
  community.docker.docker_image_pull:
    name: "{{ wazuh_dashboard_container_image }}"
    pull: always
  register: wazuh_dashboard_container_image_pull_result_ansible_module
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: wazuh_dashboard_container_image_pull_result_ansible_module is not failed

- name: Ensure Wazuh dashboard container image is pulled via ansible.builtin.command
  when: devture_systemd_docker_base_container_image_pull_method == 'command'
  ansible.builtin.command:
    cmd: "{{ devture_systemd_docker_base_host_command_docker }} pull {{ wazuh_dashboard_container_image }}"
  register: wazuh_dashboard_container_image_pull_result_command
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: wazuh_dashboard_container_image_pull_result_command is not failed
  changed_when: "'Downloaded newer image' in wazuh_dashboard_container_image_pull_result_command.stdout"

- name: Ensure Wazuh dashboard systemd service is installed
  ansible.builtin.template:
    src: "{{ role_path }}/templates/systemd/wazuh-dashboard.service.j2"
    dest: "{{ devture_systemd_docker_base_systemd_path }}/{{ wazuh_dashboard_identifier }}.service"
    mode: "0644"
  register: wazuh_dashboard_systemd_service_result

- name: Ensure Wazuh dashboard systemd service is enabled
  ansible.builtin.systemd:
    name: "{{ wazuh_dashboard_identifier }}.service"
    enabled: true
    daemon_reload: true

- name: Determine whether Wazuh dashboard needs a restart
  ansible.builtin.set_fact:
    wazuh_dashboard_restart_necessary: >-
      {{
        wazuh_dashboard_opensearch_yml_result.changed | default(false)
        or wazuh_dashboard_wazuh_yml_result.changed | default(false)
        or wazuh_dashboard_env_result.changed | default(false)
        or wazuh_dashboard_labels_result.changed | default(false)
        or wazuh_dashboard_systemd_service_result.changed | default(false)
        or wazuh_dashboard_container_image_pull_result_ansible_module.changed | default(false)
        or wazuh_dashboard_container_image_pull_result_command.changed | default(false)
      }}

- name: Notify about Wazuh dashboard needing restart
  when: wazuh_dashboard_restart_necessary | bool
  ansible.builtin.set_fact:
    devture_playbook_runtime_messages_list: |
      {{
        devture_playbook_runtime_messages_list | default([])
        +
        [
          "Note: The Wazuh dashboard configuration has changed. Restart the `" ~ wazuh_dashboard_identifier ~ ".service` systemd service to apply changes."
        ]
      }}
