---
- name: Include roles for Wazuh Molecule tests
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Include roles for Wazuh Molecule tests
      ansible.builtin.include_role:
        name: "{{ role_name }}"
        public: true
      loop:
        - com.devture.ansible.role.playbook_help
        - com.devture.ansible.role.systemd_docker_base
        - "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | basename }}"
      loop_control:
        loop_var: role_name

- name: Ensure Wazuh services are started
  hosts: all
  become: true
  gather_facts: false
  tasks:
    # This seems needed due to molecule timing out in Github Actions
    - name: Set TimeoutStartSec=0 for Wazuh services
      changed_when: false # Do not mark as changed to avoid the idempotency failure
      ansible.builtin.lineinfile:
        state: present
        path: "/etc/systemd/system/{{ item }}.service"
        insertafter: "^Type=simple"
        line: "TimeoutStartSec=0"
      loop:
        - wazuh-indexer
        - wazuh-manager
        - wazuh-dashboard

    - name: Ensure systemd daemon is reloaded
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: Ensure wazuh-indexer systemd service is started
      ansible.builtin.systemd_service:
        name: wazuh-indexer.service
        state: started

    - name: Ensure wazuh-manager systemd service is started
      ansible.builtin.systemd_service:
        name: wazuh-manager.service
        state: started

    - name: Ensure wazuh-dashboard systemd service is started
      ansible.builtin.systemd_service:
        name: wazuh-dashboard.service
        state: started

    # Set state to absent so
    # "Ensure Wazuh * systemd service is installed" tasks do not have idempotency failures
    - name: Set TimeoutStartSec=0 for Wazuh services
      changed_when: false # Do not mark as changed to avoid the idempotency failure
      ansible.builtin.lineinfile:
        state: absent
        path: "/etc/systemd/system/{{ item }}.service"
        insertafter: "^Type=simple"
        line: "TimeoutStartSec=0"
      loop:
        - wazuh-indexer
        - wazuh-manager
        - wazuh-dashboard
